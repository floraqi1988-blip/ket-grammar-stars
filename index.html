// ═══ HELPERS ═════════════════════════════════════════════════
function starsHtml(count, total, size) {
  size = size || 20;
  var h = '<span class="stars">';
  for(var i=0;i<total;i++){
    h += '<span class="star '+(i<count?"on":"off")+'" style="font-size:'+size+'px">\u2605</span>';
  }
  return h + '</span>';
}
function progressHtml(cur, total, color) {
  var pct = total ? Math.round(cur/total*100) : 0;
  return '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';
}

var QUIZ_ROUND_SIZE = 8;
function pickQuizRound(topic) {
  var pool = topic.quiz.slice();
  var n = Math.min(QUIZ_ROUND_SIZE, pool.length);
  for(var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  var picked = pool.slice(0, n);
  picked.forEach(function(q, idx) { q._origIdx = topic.quiz.indexOf(q); });
  return picked;
}

}

function renderErrors() {
  var items = errorBook.list();
  var h = '<div style="animation:fadeIn .4s ease">';
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-top:12px">';
  h += '<button class="btn btn-outline" data-action="home" style="width:auto;padding:8px 14px;font-size:14px;border-radius:10px">\u2190 \u9996\u9875</button>';
  h += '<h2 style="font-size:22px;font-weight:900;margin:0">\ud83d\udcd5 \u6211\u7684\u9519\u9898\u672c</h2>';
  if(items.length > 0){
    h += '<button class="btn btn-outline" data-action="clear-errors" style="width:auto;padding:8px 14px;font-size:13px;border-radius:10px;margin-left:auto;color:#FF6B6B">\ud83d\uddd1\ufe0f \u6e05\u7a7a</button>';
  }
  h += '</div>';
  if(items.length === 0){
    h += '<div class="card" style="text-align:center;padding:40px 24px">';
    h += '<div style="font-size:52px;margin-bottom:12px">\ud83c\udf89</div>';
    h += '<div style="font-size:18px;font-weight:800;color:#333">\u8fd8\u6ca1\u6709\u9519\u9898\u54e6\uff01</div>';
    h += '<div style="font-size:13px;color:#999;margin-top:8px">\u7ee7\u7eed\u52aa\u529b\uff0c\u4fdd\u6301\u5168\u5bf9 \u2728</div>';
    h += '</div>';
    app.innerHTML = h;
    return;
  }
  var byTopic = {};
  items.forEach(function(it){ if(!byTopic[it.topicId]) byTopic[it.topicId] = []; byTopic[it.topicId].push(it); });
  var topicIds = Object.keys(byTopic).map(function(x){return parseInt(x);}).sort(function(a,b){return a-b;});
  topicIds.forEach(function(tid){
    var topic = TOPICS[tid];
    if(!topic) return;
    h += '<div class="card" style="margin-bottom:14px;padding:16px">';
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
    h += '<span style="font-size:28px">'+topic.emoji+'</span>';
    h += '<div style="flex:1">';
    h += '<div style="font-size:15px;font-weight:800">'+topic.title+'</div>';
    h += '<div style="font-size:11px;color:#999">'+topic.subtitle+'</div>';
    h += '</div>';
    h += '<span style="font-size:11px;color:#FF6B6B;font-weight:700;background:#FFF0F0;padding:4px 10px;border-radius:12px">'+byTopic[tid].length+' \u9898</span>';
    h += '</div>';
    byTopic[tid].forEach(function(it){
      var q = topic.quiz[it.qIdx];
      if(!q) return;
      var letters = ['A','B','C','D'];
      h += '<div style="background:#F8F9FC;border-radius:12px;padding:12px;margin-bottom:8px;animation:slideUp .3s ease">';
      h += '<div style="font-size:14px;font-weight:700;color:#333;margin-bottom:6px">'+q.q+'</div>';
      h += '<div style="font-size:12px;color:#43E97B;margin-bottom:8px">\u2705 \u6b63\u786e\u7b54\u6848\uff1a<strong>'+letters[q.a]+'. '+q.o[q.a]+'</strong></div>';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<div style="font-size:11px;color:#999">\u9519\u8bef <strong style="color:#FF6B6B">'+it.count+'</strong> \u6b21 \u00b7 '+it.lastWrong+'</div>';
      h += '<button class="btn btn-outline" data-action="replay-wrong" data-topic="'+it.topicId+'" data-q="'+it.qIdx+'" style="width:auto;padding:6px 14px;font-size:12px;border-radius:8px;color:#A18CD1;border:1.5px solid #A18CD1">\ud83d\udd04 \u91cd\u505a</button>';
      h += '</div></div>';
    });
    h += '</div>';
  });
  app.innerHTML = h;
}

function showHeart(fromEl) {
  var rect = fromEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var hearts = ["\u2764\ufe0f","\ud83e\udde1","\ud83d\udc9c","\ud83d\udc9a","\ud83e\udde1"];
  hearts.forEach(function(h, i) {
    var el = document.createElement("span");
    el.className = "heart-burst";
    el.textContent = h;
    el.style.left = (cx + (i - 2) * 28) + "px";
    el.style.top = cy + "px";
    el.style.animationDelay = (i * 0.08) + "s";
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, 1200);
  });
}

  banner.className = "kuromi-banner";
  banner.textContent = "You're brilliant!";
  document.body.appendChild(banner);
  var sparkles = ["\u2728","\u2b50","\ud83d\udc9c","\ud83c\udf80","\ud83c\udf38","\ud83d\udc9c","\u2728","\u2b50"];
  var cx = window.innerWidth / 2;
  var cy = window.innerHeight / 2;
  sparkles.forEach(function(s, i) {
    var ang = (i / sparkles.length) * Math.PI * 2;
    var r = 180;
    var sp = document.createElement("span");
    sp.className = "sparkle";
    sp.textContent = s;
    sp.style.left = (cx + Math.cos(ang) * r - 18) + "px";
    sp.style.top  = (cy + Math.sin(ang) * r - 18) + "px";
    sp.style.animationDelay = (i * 0.08) + "s";
    document.body.appendChild(sp);
    setTimeout(function(){ sp.remove(); }, 1700 + i * 80);
  });
  setTimeout(function() {
    overlay.style.transition = "opacity .6s";
    stage.style.transition = "opacity .6s, transform .6s";
    banner.style.transition = "opacity .6s";
    overlay.style.opacity = "0";
    stage.style.opacity = "0";
    banner.style.opacity = "0";
    setTimeout(function(){ overlay.remove(); stage.remove(); banner.remove(); }, 600);
  }, 3000);
}

// ═══ ERROR BOOK (localStorage) ═════════════════════════════
var errorBook = (function(){
  var KEY = "ket_grammar_stars_errors_v1";
  var data = null;
  function empty(){ return { wrong:{}, history:[], totals:{} }; }
  function load(){
    if(data) return;
    try{
      var raw = localStorage.getItem(KEY);
      data = raw ? JSON.parse(raw) : empty();
    }catch(e){ data = empty(); }
    if(!data.wrong) data.wrong = {};
    if(!data.history) data.history = [];
    if(!data.totals) data.totals = {};
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){}
  }
  function key(topicId, qIdx){ return topicId + "-" + qIdx; }
  return {
    recordCorrect: function(topicId, qIdx){
      load();
      var t = data.totals[topicId] = data.totals[topicId] || {attempted:0, correct:0};
      t.attempted++; t.correct++;
      save();
    },
    recordWrong: function(topicId, qIdx, question){
      load();
      var k = key(topicId, qIdx);
      var today = new Date().toISOString().slice(0,10);
      if(!data.wrong[k]){
        data.wrong[k] = { topicId:topicId, qIdx:qIdx, count:0, lastWrong:today, firstWrong:today, q: question.q };
      }
      data.wrong[k].count++;
      data.wrong[k].lastWrong = today;
      var t = data.totals[topicId] = data.totals[topicId] || {attempted:0, correct:0};
      t.attempted++;
      data.history.push({date:today, topicId:topicId, qIdx:qIdx});
      if(data.history.length > 200) data.history = data.history.slice(-200);
      save();
    },
    clearOne: function(topicId, qIdx){
      load();
      delete data.wrong[key(topicId, qIdx)];
      save();
    },
    clearAll: function(){
      load();
      data.wrong = {}; data.history = [];
      save();
    },
    list: function(){
      load();
      var arr = [];
      for(var k in data.wrong){ if(data.wrong.hasOwnProperty(k)) arr.push(data.wrong[k]); }
      arr.sort(function(a,b){ return b.count - a.count || b.lastWrong.localeCompare(a.lastWrong); });
      return arr;
    },
    weakTopics: function(){
      load();
      var result = [];
      for(var tid in data.totals){
        var t = data.totals[tid];
        if(t.attempted >= 3){
          var wrongRate = (t.attempted - t.correct) / t.attempted;
          if(wrongRate > 0.15) result.push({ topicId: parseInt(tid), wrongRate: wrongRate, attempted: t.attempted });
        }
      }
      result.sort(function(a,b){ return b.wrongRate - a.wrongRate; });
      return result.slice(0, 3);
    },
    count: function(){
      load();
      var n = 0;
      for(var k in data.wrong){ if(data.wrong.hasOwnProperty(k)) n++; }
      return n;
    }
  };
})();

// ═══ AUTO-ADVANCE ════════════════════════════════════════════
function advanceQuestion() {
  var t = TOPICS[state.topicId];
  var quiz = state.activeQuiz;
  if(state.qIdx < quiz.length - 1) {
    state.qIdx++;
    state.selected = null;
    state.showResult = false;
    state._tried = [];
    render();
  } else {
    if(state._replayOneShot){
      state._replayOneShot = false;
      if(state.score === 1){
        errorBook.clearOne(state.topicId, quiz[state.qIdx]._origIdx);
      }
      state.view = "errors";
      state.qIdx = 0;
      state.score = 0;
      state.selected = null;
      state.showResult = false;
      render();
      return;
    }
    var total = quiz.length;
    var pct = state.score / total;
    var newStars = pct >= 0.9 ? 3 : pct >= 0.7 ? 2 : pct >= 0.5 ? 1 : 0;
    var p = state.progress[state.topicId];
    p.stars = Math.max(p.stars, newStars);
    p.best = Math.max(p.best, state.score);
    p.done = true;
    if(state.score === total) {
      showKuromi();
      playFanfare();
    }
    state.view = "result";
    render();
  }
}

// ═══ EVENTS ═════════════════════════════════════════════════
app.addEventListener("click", function(e) {
  var btn = e.target.closest("[data-action]");
  if(!btn) return;
  var action = btn.getAttribute("data-action");

  switch(action) {
    case "topic":
      state.topicId = parseInt(btn.getAttribute("data-id"));
      state.view = "learn";
      state.learnPage = 0;
      render();
      break;
    case "home":
      state.view = "home";
      state.topicId = null;
      state.qIdx = 0;
      state.score = 0;
      state.selected = null;
      state.showResult = false;
      state.learnPage = 0;
      state._replayOneShot = false;
      state._tried = [];
      render();
      break;
    case "learn-prev":
      state.learnPage = Math.max(0, state.learnPage - 1);
      render();
      break;
    case "learn-next":
      state.learnPage++;
      render();
      break;
    case "start-quiz":
      state.activeQuiz = pickQuizRound(TOPICS[state.topicId]);
      state.view = "quiz";
      state.qIdx = 0;
      state.score = 0;
      state.selected = null;
      state.showResult = false;
      state._tried = [];
      render();
      break;
    case "answer":
      var curQ = state.activeQuiz[state.qIdx];
      if(state.selected === curQ.a) return;
      var idx = parseInt(btn.getAttribute("data-idx"));
      state.selected = idx;
      state.showResult = true;
      if(idx === curQ.a) {
        if(state._tried.length === 0) state.score++;
        errorBook.recordCorrect(state.topicId, curQ._origIdx);
        showHeart(btn);
        playBingo();
        setTimeout(advanceQuestion, 1000);
      } else {
        if(state._tried.indexOf(idx) < 0) state._tried.push(idx);
        errorBook.recordWrong(state.topicId, curQ._origIdx, curQ);
        showPoop();
        playWrong();
      }
      render();
      break;
    case "next-q":
      advanceQuestion();
      break;
    case "retry":
      state.activeQuiz = pickQuizRound(TOPICS[state.topicId]);
      state.view = "quiz";
      state.qIdx = 0;
      state.score = 0;
      state.selected = null;
      state.showResult = false;
      state._tried = [];
      render();
      break;
    case "open-errors":
      state.view = "errors";
      render();
      break;
    case "clear-errors":
      if(confirm("\u786e\u5b9a\u8981\u6e05\u7a7a\u9519\u9898\u672c\u5417\uff1f")){
        errorBook.clearAll();
        render();
      }
      break;
    case "replay-wrong":
      state.topicId = parseInt(btn.getAttribute("data-topic"));
      var origQ = parseInt(btn.getAttribute("data-q"));
      var q = TOPICS[state.topicId].quiz[origQ];
      state.activeQuiz = [{q:q.q, o:q.o, a:q.a, _origIdx:origQ}];
      state.view = "quiz";
      state.qIdx = 0;
      state.score = 0;
      state.selected = null;
      state.showResult = false;
      state._replayOneShot = true;
      state._tried = [];
      render();
      break;
  }
});

render();
} catch(e) {
  document.getElementById("app").innerHTML = '<div style="padding:40px;font-family:monospace;color:red;font-size:14px"><p><b>Error:</b> ' + e.message + '</p><p style="margin-top:10px;color:#666">' + (e.stack || '') + '</p></div>';
}
})();
